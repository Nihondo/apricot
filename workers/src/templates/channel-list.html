<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no">
<title>apricot - channels</title>
<style>{{CSS}}</style>
</head><body class="admin-page">
<div class="admin-shell">
  {{ADMIN_BRAND}}
  <header class="admin-page-header">
    <div class="admin-page-header__eyebrow">WebUI</div>
    <div class="admin-page-header__row">
      <div class="admin-page-header__copy">
        <h1 class="admin-page-title">チャンネル一覧</h1>
        <p class="admin-page-description">{{SERVER_NAME}} に {{NICK}} として参加しているチャンネル一覧です。</p>
      </div>
      <div class="admin-action-bar">
        {{TOP_ACTIONS}}
      </div>
    </div>
    <div class="admin-meta-row">
      <span class="admin-status-badge {{STATUS_CLASS}}">{{STATUS_ICON}} {{STATUS_TEXT}}</span>
      <span class="admin-meta-chip">サーバー: {{SERVER_NAME}}</span>
      <span class="admin-meta-chip">NICK: {{NICK}}</span>
    </div>
  </header>

  <section class="admin-panel">
    <div class="admin-panel__header">
      <div>
        <h2 class="admin-section-title">参加中チャンネル</h2>
        <p class="admin-section-description">{{CHANNEL_COUNT}}</p>
      </div>
    </div>
    {{FLASH_MESSAGE}}
    <div class="admin-list">
      {{CHANNEL_LINKS}}
    {{NICK_FORM}}
    </div>
  </section>
</div>
</body></html>
