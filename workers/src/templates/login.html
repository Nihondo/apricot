<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no">
{{WEB_APP_HEAD}}
<title>apricot - login</title>
<style>{{CSS}}</style>
</head><body class="admin-page">
<div class="admin-shell admin-shell--narrow">
  <header class="admin-page-header admin-page-header--compact">
    <div class="admin-page-header__eyebrow">WebUI</div>
    <div class="admin-page-header__copy">
      <h1 class="admin-page-title">ログイン</h1>
      <p class="admin-page-description">保護された apricot Web UI にアクセスするためのログイン画面です。</p>
    </div>
  </header>

  <section class="admin-panel admin-panel--elevated">
    <div class="admin-panel__header">
      <div>
        <h2 class="admin-section-title">WebUIログイン</h2>
        <p class="admin-section-description">設定変更とチャンネル閲覧のために認証します。</p>
      </div>
    </div>
    {{ERROR}}
    <form action="{{ACTION_URL}}" method="POST" class="admin-form">
      <label class="admin-field">
        <span class="admin-field__label">パスワード</span>
        <input type="password" name="password" class="admin-input" autocomplete="current-password">
      </label>
      <div class="admin-form__actions">
        <button type="submit" class="admin-button admin-button--primary">ログイン</button>
      </div>
    </form>
  </section>
</div>
</body></html>
