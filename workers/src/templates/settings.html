<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no">
<title>apricot - settings</title>
<style>{{CSS}}</style>
</head><body class="admin-page">
<div class="admin-shell">
  <header class="admin-page-header">
    <div class="admin-page-header__eyebrow">Web UI</div>
    <div class="admin-page-header__row">
      <div class="admin-page-header__copy">
        <h1 class="admin-page-title">Channel view settings</h1>
        <p class="admin-page-description">{{NICK}} on {{SERVER_NAME}} のチャンネル画面に適用する表示設定です。</p>
      </div>
      <div class="admin-action-bar">
        {{TOP_ACTIONS}}
      </div>
    </div>
  </header>

  <div class="admin-message admin-message--info">
    <strong>この設定はチャンネル画面にのみ適用されます。</strong>
    <span>チャンネル一覧、設定画面、ログイン画面は固定のモダンUIで表示されます。</span>
  </div>
  {{ERROR}}

  <section class="admin-panel">
    <div class="admin-panel__header">
      <div>
        <h2 class="admin-section-title">Visual customization</h2>
        <p class="admin-section-description">フォント、色、表示順、追加CSSを保存します。</p>
      </div>
    </div>
    <form action="{{ACTION_URL}}" method="POST" class="admin-form">
      <label class="admin-field">
        <span class="admin-field__label">Font family</span>
        <input type="text" name="fontFamily" value="{{FONT_FAMILY}}" class="admin-input" maxlength="200">
      </label>
      <label class="admin-field">
        <span class="admin-field__label">Font size (px)</span>
        <input type="number" name="fontSizePx" value="{{FONT_SIZE_PX}}" min="10" max="32" class="admin-input">
      </label>
      <div class="admin-grid admin-grid--three">
        <label class="admin-field">
          <span class="admin-field__label">Text color</span>
          <input type="color" name="textColor" value="{{TEXT_COLOR}}" class="admin-input admin-input--color">
        </label>
        <label class="admin-field">
          <span class="admin-field__label">Background color</span>
          <input type="color" name="surfaceColor" value="{{SURFACE_COLOR}}" class="admin-input admin-input--color">
        </label>
        <label class="admin-field">
          <span class="admin-field__label">Alt background color</span>
          <input type="color" name="surfaceAltColor" value="{{SURFACE_ALT_COLOR}}" class="admin-input admin-input--color">
        </label>
      </div>
      <label class="admin-field">
        <span class="admin-field__label">Accent color</span>
        <input type="color" name="accentColor" value="{{ACCENT_COLOR}}" class="admin-input admin-input--color">
      </label>
      <fieldset class="admin-fieldset">
        <legend class="admin-field__label">Display order</legend>
        <label class="admin-radio-option"><input type="radio" name="displayOrder" value="asc" {{DISPLAY_ORDER_ASC_CHECKED}}> 古い順</label>
        <label class="admin-radio-option"><input type="radio" name="displayOrder" value="desc" {{DISPLAY_ORDER_DESC_CHECKED}}> 新しい順</label>
      </fieldset>
      <label class="admin-field">
        <span class="admin-field__label">Extra CSS</span>
        <textarea name="extraCss" rows="12" class="admin-textarea">{{EXTRA_CSS}}</textarea>
      </label>
      <div class="admin-form__actions">
        <button type="submit" class="admin-button admin-button--primary">Save settings</button>
      </div>
    </form>
  </section>
</div>
</body></html>
