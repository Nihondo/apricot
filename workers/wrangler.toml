name = "apricot"
main = "src/index.ts"
compatibility_date = "2024-12-30"

[vars]
IRC_HOST = "irc.friend-chat.jp"
IRC_PORT = "6660-6669"
IRC_NICK = "apricot"
IRC_USER = "apricot"
IRC_REALNAME = "apricot IRC Proxy"
IRC_TLS = "false"
IRC_AUTO_CONNECT_ON_STARTUP = "true"
IRC_AUTO_RECONNECT_ON_DISCONNECT = "true"
IRC_CONNECT_TIMEOUT_MS = "10000"
IRC_REGISTRATION_TIMEOUT_MS = "120000"
IRC_RECONNECT_BASE_DELAY_MS = "5000"
IRC_RECONNECT_MAX_DELAY_MS = "60000"
IRC_RECONNECT_JITTER_RATIO = "0.2"
IRC_IDLE_PING_INTERVAL_MS = "240000"
IRC_PING_TIMEOUT_MS = "90000"
IRC_AUTOJOIN = "#dameTunes"
KEEPALIVE_INTERVAL = "60"
TIMEZONE_OFFSET = "9"
WEB_LOG_MAX_LINES = "200"
IRC_ENCODING = "iso-2022-jp"
ENABLE_REMOTE_URL_PREVIEW = "true"

[[rules]]
type = "Text"
globs = ["**/*.html", "**/*.css"]
fallthrough = false

[[rules]]
type = "Data"
globs = ["**/*.png", "**/*.ico"]
fallthrough = false

[durable_objects]
bindings = [
  { name = "IRC_PROXY", class_name = "IrcProxyDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["IrcProxyDO"]

[observability]
[observability.logs]
enabled = true
invocation_logs = true
